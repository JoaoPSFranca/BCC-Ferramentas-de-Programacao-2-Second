<form [formGroup]="form" (ngSubmit)="login()">
  <div>
    <label>Login</label>
    <input type="text" id="email" formControlName="email" />
  </div>
  <div>
    <label>Senha</label>
    <input type="text" id="password" formControlName="password" />
  </div>

  <button type="submit">Entrar</button>
</form>
